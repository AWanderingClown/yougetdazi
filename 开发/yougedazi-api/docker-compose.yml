version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yougedazi-api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres@postgres:5432/yougedazi"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "pp-mate-dev-secret-key-minimum-32-chars-long-2026"
      ADMIN_JWT_SECRET: "yougedazi-admin-dev-secret-key-32chars-2026"
      JWT_EXPIRES_IN: "7d"
      WX_MOCK_LOGIN: "true"
      WX_C_APP_ID: "TODO_wx_c_app_id"
      WX_C_APP_SECRET: "TODO_wx_c_app_secret"
      WX_B_APP_ID: "TODO_wx_b_app_id"
      WX_B_APP_SECRET: "TODO_wx_b_app_secret"
      WX_PAY_MCH_ID: "TODO_mch_id"
      WX_PAY_PRIVATE_KEY: "TODO_private_key"
      WX_PAY_SERIAL_NO: "TODO_serial_no"
      WX_PAY_API_V3_KEY: "TODO_api_v3_key"
      WX_PAY_NOTIFY_URL: "https://your-domain.com/webhook/wx-pay"
      COS_SECRET_ID: "TODO_cos_secret_id"
      COS_SECRET_KEY: "TODO_cos_secret_key"
      COS_BUCKET: "TODO_bucket_name"
      COS_REGION: "ap-guangzhou"
      FIELD_ENCRYPT_KEY: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2"
      CORS_ORIGINS: ""
      ADMIN_PUSH_SERVER_URL: "http://localhost:3002"
      PUSH_API_KEY: "dev-push-key-2026"
      TENCENT_MAP_KEY: "ZQTBZ-IVGCQ-P5L56-4YVUW-MOIOE-PDBWR"
      PORT: "3000"
      NODE_ENV: "development"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - yougedazi-net

  postgres:
    image: postgres:15-alpine
    container_name: yougedazi-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: yougedazi
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - yougedazi-net

  redis:
    image: redis:7-alpine
    container_name: yougedazi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - yougedazi-net

volumes:
  postgres_data:
  redis_data:

networks:
  yougedazi-net:
